# your-domain.example — reverse proxy for the camera backend + PWA.
# Full final form (TLS included) so the vhost is reproducible from the repo.
# Cert files are managed by certbot (`certbot certonly`/auto-renew just swaps the
# files under /etc/letsencrypt/live and reloads nginx — it doesn't need to edit
# this vhost). Intentionally NO `default_server` here — 00-default-deny.conf owns
# that; this vhost is matched by server_name.

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name your-domain.example;

    ssl_certificate     /etc/letsencrypt/live/your-domain.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.example/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/camera-server/pwa;
    index index.html;

    # correct MIME for the manifest (nginx's mime.types has no .webmanifest).
    # Empty `types {}` clears the inherited map for this location so default_type wins.
    location = /manifest.webmanifest { types {} default_type application/manifest+json; }
    # the service worker must not be cached, so updates roll out immediately
    location = /sw.js { add_header Cache-Control "no-cache"; }

    # PWA static files, with an SPA-style fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JSON API -> gunicorn. Uploads stream through (no request buffering) so a
    # large clip never lands in nginx/RAM on this small box.
    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_request_buffering off;
        client_max_body_size 4g;
    }

    # Internal target for X-Accel-Redirect from Flask: nginx streams the mp4
    # (Range requests, sendfile) after Flask has checked the signed URL.
    location /_media/ {
        internal;
        alias /opt/camera-server/data/recordings/;
    }

    # Internal target for X-Accel-Redirect of live HLS segments (fMP4). Flask
    # validates the signed ?t= token, then nginx serves the bytes. Ephemeral, so
    # no client caching (the playlist is no-store and rotates every second).
    location /_hls/ {
        internal;
        alias /opt/camera-server/data/live/hls/;
        add_header Cache-Control "no-store";
    }
}
